<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a" />
      <stop offset="1" stop-color="#27272a" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f4f4f5" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect x="28" y="28" width="200" height="200" rx="44" fill="url(#bg)" />

  <!-- Back card -->
  <g filter="url(#shadow)">
    <rect x="68" y="54" width="124" height="164" rx="22" fill="url(#card)" opacity="0.92" />
    <rect x="78" y="64" width="104" height="144" rx="16" fill="none" stroke="#e4e4e7" stroke-width="6" />
  </g>

  <!-- Front card -->
  <g filter="url(#shadow)">
    <rect x="54" y="40" width="132" height="176" rx="24" fill="url(#card)" />
    <rect x="64" y="50" width="112" height="156" rx="18" fill="none" stroke="#e4e4e7" stroke-width="6" />

    <!-- Question mark -->
    <g fill="#18181b">
      <path d="M128 78c-18 0-32 10-32 26h16c0-8 7-12 16-12 9 0 16 4 16 12 0 9-8 12-15 16-10 6-17 13-17 28v4h16v-3c0-9 4-13 12-18 11-7 20-14 20-29 0-16-14-24-32-24z"/>
      <rect x="120" y="170" width="16" height="16" rx="4"/>
    </g>
  </g>
</svg>

